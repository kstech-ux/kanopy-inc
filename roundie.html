<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=https://roundie.app/">
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://roundie.app/">
  <title>ROUNDIE — Redirecting to roundie.app</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.88em' font-size='70' font-weight='900' fill='%2381C784' font-family='Arial'>R</text></svg>">
  <script>
    (function(){
      var target = 'https://roundie.app/';
      var search = window.location.search || '';
      var hash = window.location.hash || '';
      window.location.replace(target + search + hash);
    })();
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#0A0A0A;color:#EDEDEF;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
    .wrap{max-width:480px}
    .logo{font-family:'Arial Black',sans-serif;font-size:42px;font-weight:900;letter-spacing:14px;color:#81C784;margin-bottom:24px}
    h1{font-size:18px;font-weight:500;color:#EDEDEF;margin-bottom:14px}
    p{font-size:14px;color:#9095A0;line-height:1.85;margin-bottom:28px}
    a{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:#81C784;color:#0A0A0A;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:1px;text-decoration:none;transition:all .2s}
    a:hover{box-shadow:0 0 32px rgba(129,199,132,.3);transform:translateY(-1px)}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid #2D5A27;border-top-color:#81C784;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">ROUNDIE</div>
    <h1><span class="spinner"></span>roundie.app へ移動中...</h1>
    <p>ROUNDIE のページは <strong style="color:#EDEDEF">roundie.app</strong> に移動しました。<br>自動で転送されない場合は下のボタンをタップしてください。</p>
    <a href="https://roundie.app/">roundie.app →</a>
  </div>
</body>
</html>
